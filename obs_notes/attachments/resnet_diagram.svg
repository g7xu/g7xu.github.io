<line x1="69" y1="215" x2="151" y2="150"/><line x1="69" y1="215" x2="151" y2="215"/><line x1="69" y1="215" x2="151" y2="280"/><line x1="69" y1="215" x2="151" y2="345"/>
<line x1="69" y1="280" x2="151" y2="150"/><line x1="69" y1="280" x2="151" y2="215"/><line x1="69" y1="280" x2="151" y2="280"/><line x1="69" y1="280" x2="151" y2="345"/>

</g>
<g fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5">
<circle cx="165" cy="150" r="14"/><circle cx="165" cy="215" r="14"/><circle cx="165" cy="280" r="14"/><circle cx="165" cy="345" r="14"/>
<circle cx="270" cy="150" r="14"/><circle cx="270" cy="215" r="14"/><circle cx="270" cy="280" r="14"/><circle cx="270" cy="345" r="14"/>

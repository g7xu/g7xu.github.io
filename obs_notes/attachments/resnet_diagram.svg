<g>
<circle cx="335" cy="247" r="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="335" y="252" text-anchor="middle" style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #633806;">+</text>
<circle cx="565" cy="247" r="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="565" y="252" text-anchor="middle" style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #633806;">+</text>
</g>
<g fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5">
<circle cx="620" cy="180" r="14"/><circle cx="620" cy="247" r="14"/><circle cx="620" cy="314" r="14"/>
</g>

<text class="ts" x="55" y="110" text-anchor="middle">Input</text>
<text class="ts" x="620" y="160" text-anchor="middle">Output</text>
<text class="ts" x="218" y="395" text-anchor="middle">Residual block 1: learns F1(x)</text>
<text class="ts" x="453" y="395" text-anchor="middle">Residual block 2: learns F2(x)</text>
<text class="ts" x="340" y="420" text-anchor="middle">Each + junction adds the skipped copy of x to the block's output F(x)</text>
<text class="ts" x="648" y="436" text-anchor="end">Generated by Claude</text>
</svg>

<svg width="680" height="440" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ResNet drawn as a node-and-wire network diagram</title>
<desc>An input layer of blue nodes feeds two residual blocks of teal weight layers. Dashed arcs jump over each block and meet plus junctions where the skipped input is added to the block output, before reaching the output layer.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
text { font-family: "Helvetica Neue", Arial, sans-serif; }
.ts { font-size: 12px; fill: #5F5E5A; font-weight: 400; }
.th { font-size: 14px; fill: #2C2C2A; font-weight: 500; }
</style>

<rect x="0" y="0" width="680" height="440" fill="#FFFFFF"/>

<text class="ts" x="340" y="26" text-anchor="middle">Dashed arcs = skip connections carrying x forward untouched</text>

<path d="M 60 128 C 120 35, 285 35, 330 232" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<path d="M 342 232 C 395 45, 515 45, 564 232" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

<rect x="139" y="120" width="159" height="255" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4"/>
<rect x="374" y="120" width="159" height="255" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4"/>

<g stroke="#B4B2A9" stroke-width="0.6" opacity="0.5">

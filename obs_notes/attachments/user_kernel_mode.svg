<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
<style>
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .arr { stroke: #73726c; stroke-width: 1.5; }
  .leader { stroke: #b4b2a9; stroke-width: 0.5; stroke-dasharray: 3 2; }
  .box rect { fill: #f1efe8; stroke: #b4b2a9; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }
  .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red .th { fill: #791F1F; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
</style>
<rect width="680" height="540" fill="#ffffff"/>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- User mode container -->
<g class="c-blue">
  <rect x="40" y="30" width="600" height="170" rx="16" stroke-width="0.5"/>
  <text class="th" x="340" y="58" text-anchor="middle">User mode (unprivileged)</text>
  <text class="ts" x="340" y="76" text-anchor="middle">No direct hardware access</text>
</g>
<g class="c-blue">
  <rect x="70" y="95" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="117" text-anchor="middle" dominant-baseline="central">Arithmetic</text>
</g>
<g class="c-blue">
  <rect x="210" y="95" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="117" text-anchor="middle" dominant-baseline="central">App logic</text>
</g>
<g class="c-blue">
  <rect x="350" y="95" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="420" y="117" text-anchor="middle" dominant-baseline="central">Own memory</text>
</g>
<g class="c-blue">
  <rect x="510" y="95" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="565" y="117" text-anchor="middle" dominant-baseline="central">Functions</text>
</g>
<text class="ts" x="340" y="170" text-anchor="middle">Stays within your process, no outside world</text>

<!-- Protection boundary -->
<line x1="40" y1="245" x2="640" y2="245" stroke="#E24B4A" stroke-width="2" stroke-dasharray="8 4"/>
<g class="c-red">
  <rect x="230" y="225" width="220" height="40" rx="20" stroke-width="0.5"/>
  <text class="th" x="340" y="245" text-anchor="middle" dominant-baseline="central">Protection boundary</text>
</g>

<!-- Syscall arrows -->
<line x1="240" y1="200" x2="240" y2="223" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="440" y1="200" x2="440" y2="223" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="215" text-anchor="middle" fill="#E24B4A">syscall</text>
<text class="ts" x="500" y="215" text-anchor="middle" fill="#E24B4A">syscall</text>

<!-- Kernel mode container -->
<g class="c-teal">
  <rect x="40" y="290" width="600" height="170" rx="16" stroke-width="0.5"/>
  <text class="th" x="340" y="318" text-anchor="middle">Kernel mode (privileged)</text>
  <text class="ts" x="340" y="336" text-anchor="middle">Full hardware access</text>
</g>
<g class="c-teal">
  <rect x="60" y="355" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="377" text-anchor="middle" dominant-baseline="central">Disk I/O</text>
</g>
<g class="c-teal">
  <rect x="185" y="355" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="240" y="377" text-anchor="middle" dominant-baseline="central">Network</text>
</g>
<g class="c-teal">
  <rect x="310" y="355" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="365" y="377" text-anchor="middle" dominant-baseline="central">Memory</text>
</g>
<g class="c-teal">
  <rect x="435" y="355" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="490" y="377" text-anchor="middle" dominant-baseline="central">Processes</text>
</g>
<g class="c-teal">
  <rect x="560" y="355" width="70" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="595" y="377" text-anchor="middle" dominant-baseline="central">Drivers</text>
</g>
<text class="ts" x="340" y="430" text-anchor="middle">Touches hardware, devices, other processes</text>

<!-- Hardware -->
<line x1="340" y1="460" x2="340" y2="480" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
  <rect x="160" y="482" width="360" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="500" text-anchor="middle" dominant-baseline="central">Hardware (CPU, disk, NIC, GPU)</text>
</g>

<!-- Attribution -->
<text x="640" y="534" text-anchor="end" font-size="11px" fill="#b4b2a9">Generated by Claude</text>
</svg>
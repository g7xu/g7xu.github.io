<svg width="680" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <title>Feature detection: flat, edge, and corner cases</title>
  <desc>Three side-by-side illustrations showing how a sliding window responds to flat regions, edges, and corners in an image.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #3d3d3a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="400" fill="#ffffff"/>

  <!-- CASE 1: FLAT -->
  <g>
    <rect x="40" y="60" width="160" height="160" rx="6" fill="#B4B2A9"/>
    <rect x="90" y="110" width="60" height="60" rx="3" fill="none" stroke="#534AB7" stroke-width="2" stroke-dasharray="4 2"/>
    <line x1="120" y1="108" x2="120" y2="88" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="120" y1="172" x2="120" y2="192" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="88" y1="140" x2="68" y2="140" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="152" y1="140" x2="172" y2="140" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text class="ts" x="120" y="250" text-anchor="middle" fill="#888780">no change in</text>
    <text class="ts" x="120" y="265" text-anchor="middle" fill="#888780">any direction</text>
    <rect x="74" y="35" width="92" height="22" rx="4" fill="#EEEDFE"/>
    <text class="th" x="120" y="51" text-anchor="middle" fill="#3C3489">"flat" region</text>
    <rect x="88" y="290" width="64" height="10" rx="3" fill="#D3D1C7"/>
    <rect x="88" y="290" width="10" height="10" rx="3" fill="#534AB7"/>
    <text class="ts" x="120" y="318" text-anchor="middle" fill="#888780">response: low</text>
  </g>

  <!-- CASE 2: EDGE -->
  <g>
    <rect x="260" y="60" width="160" height="160" rx="6" fill="#D3D1C7"/>
    <rect x="260" y="60" width="80" height="160" rx="0" fill="#888780"/>
    <rect x="260" y="60" width="6" height="160" rx="6" fill="#888780"/>
    <line x1="340" y1="60" x2="340" y2="220" stroke="#444441" stroke-width="1.5" opacity="0.4"/>
    <rect x="310" y="110" width="60" height="60" rx="3" fill="none" stroke="#534AB7" stroke-width="2" stroke-dasharray="4 2"/>
    <line x1="340" y1="108" x2="340" y2="88" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="340" y1="172" x2="340" y2="192" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="308" y1="140" x2="280" y2="140" stroke="#BA7517" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="372" y1="140" x2="400" y2="140" stroke="#BA7517" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text class="ts" x="340" y="250" text-anchor="middle" fill="#888780">big change ↔</text>
    <text class="ts" x="340" y="265" text-anchor="middle" fill="#888780">no change ↕</text>
    <rect x="294" y="35" width="92" height="22" rx="4" fill="#FAEEDA"/>
    <text class="th" x="340" y="51" text-anchor="middle" fill="#633806">"edge"</text>
    <rect x="308" y="290" width="64" height="10" rx="3" fill="#D3D1C7"/>
    <rect x="308" y="290" width="36" height="10" rx="3" fill="#BA7517"/>
    <text class="ts" x="340" y="318" text-anchor="middle" fill="#888780">response: medium</text>
  </g>

  <!-- CASE 3: CORNER -->
  <g>
    <rect x="480" y="60" width="160" height="160" rx="6" fill="#D3D1C7"/>
    <rect x="480" y="60" width="80" height="80" rx="0" fill="#888780"/>
    <rect x="480" y="60" width="6" height="80" fill="#888780"/>
    <rect x="480" y="60" width="80" height="6" fill="#888780"/>
    <line x1="560" y1="60" x2="560" y2="220" stroke="#444441" stroke-width="1.5" opacity="0.4"/>
    <line x1="480" y1="140" x2="640" y2="140" stroke="#444441" stroke-width="1.5" opacity="0.4"/>
    <rect x="530" y="110" width="60" height="60" rx="3" fill="none" stroke="#534AB7" stroke-width="2" stroke-dasharray="4 2"/>
    <line x1="560" y1="108" x2="560" y2="82" stroke="#993C1D" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="560" y1="172" x2="560" y2="198" stroke="#993C1D" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="528" y1="140" x2="502" y2="140" stroke="#993C1D" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="592" y1="140" x2="618" y2="140" stroke="#993C1D" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text class="ts" x="560" y="250" text-anchor="middle" fill="#888780">big change in</text>
    <text class="ts" x="560" y="265" text-anchor="middle" fill="#888780">all directions</text>
    <rect x="510" y="35" width="100" height="22" rx="4" fill="#FAECE7"/>
    <text class="th" x="560" y="51" text-anchor="middle" fill="#712B13">"corner"</text>
    <rect x="528" y="290" width="64" height="10" rx="3" fill="#D3D1C7"/>
    <rect x="528" y="290" width="64" height="10" rx="3" fill="#993C1D"/>
    <text class="ts" x="560" y="318" text-anchor="middle" fill="#888780">response: high</text>
  </g>

  <!-- Generated by Claude -->
  <text x="668" y="392" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888780">Generated by Claude</text>
</svg>

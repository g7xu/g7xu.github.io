<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pinhole camera model</title>
  <desc>A dark box with a tiny pinhole. Light rays from a rectangle outside pass through the pinhole and land on the back wall.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="380" fill="white"/>

  <!-- Dark box -->
  <rect x="270" y="60" width="340" height="250" rx="6" fill="#f0f0ee" stroke="#222" stroke-width="2"/>
  <rect x="272" y="62" width="336" height="246" rx="4" fill="#e0deda" opacity="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="440" y="336" text-anchor="middle" fill="#444">Dark box (camera)</text>

  <!-- Left wall with pinhole gap -->
  <rect x="266" y="60" width="8" height="118" fill="#222"/>
  <rect x="266" y="200" width="8" height="110" fill="#222"/>

  <!-- Pinhole -->
  <circle cx="270" cy="190" r="4.5" fill="white" stroke="#222" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="254" y="186" text-anchor="end" fill="#555">Pinhole</text>
  <line x1="255" y1="190" x2="264" y2="190" stroke="#555" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Back wall -->
  <rect x="600" y="60" width="8" height="250" rx="2" fill="#185FA5" opacity="0.85"/>
  <text font-family="sans-serif" font-size="12" x="616" y="182" fill="#185FA5">Image</text>
  <text font-family="sans-serif" font-size="12" x="616" y="197" fill="#185FA5">(back wall)</text>

  <!-- Object: simple rectangle -->
  <rect x="110" y="130" width="40" height="120" rx="4" fill="#3B6D11" stroke="#27500A" stroke-width="1.5"/>
  <text font-family="sans-serif" font-size="12" x="130" y="274" text-anchor="middle" fill="#555">Object</text>

  <!-- Ray from top → pinhole → back wall bottom -->
  <line x1="130" y1="130" x2="270" y2="190" stroke="#EF9F27" stroke-width="2"/>
  <line x1="270" y1="190" x2="600" y2="285" stroke="#EF9F27" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrow)"/>

  <!-- Ray from bottom → pinhole → back wall top -->
  <line x1="130" y1="250" x2="270" y2="190" stroke="#D85A30" stroke-width="2"/>
  <line x1="270" y1="190" x2="600" y2="95" stroke="#D85A30" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrow)"/>

  <!-- Key rule box -->
  <rect x="28" y="20" width="218" height="42" rx="8" fill="#f5f5f2" stroke="#ccc" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="12" x="137" y="38" text-anchor="middle" fill="#555">Every ray must pass through</text>
  <text font-family="sans-serif" font-size="13" font-weight="600" x="137" y="55" text-anchor="middle" fill="#222">the one pinhole</text>

  <!-- Generated by Claude -->
  <text font-family="sans-serif" font-size="11" x="668" y="372" text-anchor="end" fill="#aaa">Generated by Claude</text>
</svg>

<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Stage 1: User query -->
<g>
  <rect x="40" y="40" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="140" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">User query</text>
  <text x="140" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">"How do vaccines work?"</text>
</g>

<!-- Arrow 1 -->
<line x1="140" y1="96" x2="140" y2="140" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 2: Embedding model -->
<g>
  <rect x="40" y="140" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="140" y="160" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Embedding model</text>
  <text x="140" y="178" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Text → vector</text>
</g>

<!-- Arrow 2 -->
<line x1="140" y1="196" x2="140" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 3: Vector search -->
<g>
  <rect x="40" y="240" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="140" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Vector search</text>
  <text x="140" y="278" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Find nearest neighbors</text>
</g>

<!-- Knowledge base -->
<g>
  <rect x="380" y="160" width="260" height="190" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="510" y="186" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Knowledge base</text>
  <rect x="400" y="206" width="220" height="28" rx="4" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="510" y="220" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Chunk: "Vaccines stimulate the..."</text>
  <rect x="400" y="242" width="220" height="28" rx="4" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="510" y="256" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Chunk: "mRNA delivers instruc..."</text>
  <rect x="400" y="278" width="220" height="28" rx="4" fill="#fff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="510" y="292" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Chunk: "The immune system re..."</text>
  <rect x="400" y="314" width="220" height="28" rx="4" fill="#fff" stroke="#D3D1C7" stroke-width="0.5" opacity="0.4"/>
  <text x="510" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A" opacity="0.4">... thousands more</text>
</g>

<!-- Arrow: knowledge base to vector search -->
<line x1="380" y1="268" x2="242" y2="268" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="311" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">top-k matches</text>

<!-- Arrow 3 -->
<line x1="140" y1="296" x2="140" y2="350" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 4: Augmented prompt -->
<g>
  <rect x="40" y="350" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="180" y="370" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Augmented prompt</text>
  <text x="180" y="388" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Query + retrieved context → LLM</text>
</g>

<!-- Arrow 4 -->
<line x1="180" y1="406" x2="180" y2="450" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 5: LLM generates answer -->
<g>
  <rect x="40" y="450" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="180" y="470" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">LLM generates answer</text>
  <text x="180" y="488" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Grounded in retrieved evidence</text>
</g>
<!-- Credit -->
<text x="670" y="515" text-anchor="end" font-size="11" fill="#B4B2A9">Generated by Claude</text>
</svg>
<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Three critical components of image capture</title>
<desc>A light source emits rays toward an object, which reflects light to a camera, whose sensor records the image.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 400; }
.ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
.th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
</style>
</defs>

<!-- Source A: Light source (sun) -->
<circle cx="110" cy="110" r="28" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<!-- 8 evenly distributed sun rays -->
<line x1="110" y1="72" x2="110" y2="56" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="137" y1="83" x2="148" y2="72" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="148" y1="110" x2="164" y2="110" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="137" y1="137" x2="148" y2="148" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="110" y1="148" x2="110" y2="164" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="83" y1="137" x2="72" y2="148" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="72" y1="110" x2="56" y2="110" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
<line x1="83" y1="83" x2="72" y2="72" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>

<!-- Label for Source A -->
<text class="th" x="110" y="200" text-anchor="middle" fill="#854F0B">Source A</text>
<text class="ts" x="110" y="218" text-anchor="middle" fill="#854F0B">Light source</text>

<!-- Arrow 1: Light emitted from Source A to Source B -->
<line x1="145" y1="125" x2="300" y2="225" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- Label BELOW the arrow -->
<text class="ts" x="215" y="210" text-anchor="middle" fill="#854F0B">① Light emitted</text>

<!-- Source B: Object being photographed (BLACK) -->
<path d="M 340 200 Q 310 200 305 235 Q 300 270 335 275 Q 370 280 385 260 Q 400 240 385 220 Q 370 195 340 200 Z" fill="#2C2C2A" stroke="#000000" stroke-width="1"/>
<text class="th" x="345" y="310" text-anchor="middle" fill="#2C2C2A">Source B</text>
<text class="ts" x="345" y="328" text-anchor="middle" fill="#2C2C2A">Scene object</text>

<!-- Arrow 2: Light reflected from Source B edge to Camera lens -->
<line x1="395" y1="245" x2="543" y2="240" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- Label BELOW the arrow -->
<text class="ts" x="470" y="265" text-anchor="middle" fill="#712B13">② Light reflected</text>

<!-- Camera body -->
<rect x="555" y="200" width="110" height="80" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<!-- Lens (positioned on left side of camera so reflection arrow connects to it) -->
<circle cx="570" cy="240" r="13" fill="#85B7EB" stroke="#185FA5" stroke-width="1"/>
<circle cx="570" cy="240" r="6" fill="#0C447C"/>
<!-- Sensor indicator (grid inside camera body) -->
<rect x="600" y="222" width="55" height="36" fill="none" stroke="#185FA5" stroke-width="0.5"/>
<line x1="600" y1="234" x2="655" y2="234" stroke="#185FA5" stroke-width="0.3"/>
<line x1="600" y1="246" x2="655" y2="246" stroke="#185FA5" stroke-width="0.3"/>
<line x1="618" y1="222" x2="618" y2="258" stroke="#185FA5" stroke-width="0.3"/>
<line x1="637" y1="222" x2="637" y2="258" stroke="#185FA5" stroke-width="0.3"/>

<!-- Label for Camera -->
<text class="th" x="610" y="310" text-anchor="middle" fill="#0C447C">Camera</text>
<text class="ts" x="610" y="328" text-anchor="middle" fill="#0C447C">Sensor records</text>

<!-- Step 3 label above camera -->
<text class="ts" x="610" y="190" text-anchor="middle" fill="#0C447C">③ Light recorded</text>

<!-- Attribution bottom right -->
<text class="ts" x="670" y="390" text-anchor="end" fill="#888780">Generated by Claude</text>
</svg>

<svg width="100%" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff;">
<defs>
  <linearGradient id="spec" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#534AB7"/>
    <stop offset="100%" stop-color="#1D9E75"/>
  </linearGradient>
</defs>

<!-- Spectrum bar -->
<rect x="60" y="120" width="560" height="12" rx="6" fill="url(#spec)" opacity="0.7"/>

<!-- Left label: Expressiveness -->
<text x="60" y="100" font-size="14" font-weight="500" fill="#3C3489">Expressiveness</text>
<text x="60" y="165" font-size="11" fill="#534AB7">Fine-grained interaction</text>
<text x="60" y="180" font-size="11" fill="#534AB7">Higher accuracy</text>
<text x="60" y="195" font-size="11" fill="#534AB7">Slower at scale</text>

<!-- Right label: Efficiency -->
<text x="620" y="100" text-anchor="end" font-size="14" font-weight="500" fill="#085041">Efficiency</text>
<text x="620" y="165" text-anchor="end" font-size="11" fill="#0F6E56">Precomputed embeddings</text>
<text x="620" y="180" text-anchor="end" font-size="11" fill="#0F6E56">Low latency</text>
<text x="620" y="195" text-anchor="end" font-size="11" fill="#0F6E56">Scales to millions</text>

<!-- Cross-encoder marker -->
<circle cx="120" cy="126" r="8" fill="#3C3489"/>
<line x1="120" y1="134" x2="120" y2="220" stroke="#3C3489" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="120" y="238" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Cross-encoder</text>
<text x="120" y="255" text-anchor="middle" font-size="11" fill="#534AB7">Joint encoding</text>

<!-- Late interaction marker (ColBERT) -->
<circle cx="340" cy="126" r="8" fill="#854F0B"/>
<line x1="340" y1="134" x2="340" y2="220" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="340" y="238" text-anchor="middle" font-size="13" font-weight="500" fill="#854F0B">ColBERT</text>
<text x="340" y="255" text-anchor="middle" font-size="11" fill="#854F0B">Late interaction</text>

<!-- Bi-encoder marker -->
<circle cx="540" cy="126" r="8" fill="#085041"/>
<line x1="540" y1="134" x2="540" y2="220" stroke="#085041" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="540" y="238" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Bi-encoder</text>
<text x="540" y="255" text-anchor="middle" font-size="11" fill="#0F6E56">Independent encoding</text>

<!-- Arrows on ends -->
<path d="M56 126L42 126" fill="none" stroke="#3C3489" stroke-width="1.5"/>
<path d="M46 122L40 126L46 130" fill="none" stroke="#3C3489" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M624 126L638 126" fill="none" stroke="#085041" stroke-width="1.5"/>
<path d="M634 122L640 126L634 130" fill="none" stroke="#085041" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Credit -->
<text x="670" y="285" text-anchor="end" font-size="11" fill="#B4B2A9">Generated by Claude</text>
</svg>
<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
<style>
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .arr { stroke: #73726c; stroke-width: 1.5; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
</style>
<rect width="680" height="560" fill="#ffffff"/>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- New -->
<g class="c-gray">
  <rect x="40" y="110" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="90" y="132" text-anchor="middle" dominant-baseline="central">New</text>
</g>

<!-- Ready -->
<g class="c-blue">
  <rect x="220" y="110" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="132" text-anchor="middle" dominant-baseline="central">Ready</text>
</g>

<!-- Run -->
<g class="c-teal">
  <rect x="420" y="110" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="470" y="132" text-anchor="middle" dominant-baseline="central">Run</text>
</g>

<!-- Terminated -->
<g class="c-gray">
  <rect x="580" y="110" width="90" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="625" y="132" text-anchor="middle" dominant-baseline="central">Terminated</text>
</g>

<!-- Wait/Block -->
<g class="c-coral">
  <rect x="420" y="280" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="470" y="302" text-anchor="middle" dominant-baseline="central">Wait</text>
</g>

<!-- Suspended Ready -->
<g class="c-purple">
  <rect x="180" y="440" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="250" y="462" text-anchor="middle" dominant-baseline="central">Susp. ready</text>
</g>

<!-- Suspended Block -->
<g class="c-purple">
  <rect x="410" y="440" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="480" y="462" text-anchor="middle" dominant-baseline="central">Susp. block</text>
</g>

<!-- New -> Ready -->
<line x1="140" y1="132" x2="218" y2="132" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="122" text-anchor="middle">Admitted</text>

<!-- Ready -> Run -->
<line x1="320" y1="125" x2="418" y2="125" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="370" y="116" text-anchor="middle">Dispatch</text>

<!-- Run -> Ready (preempt) -->
<path d="M420 110 Q370 68 270 68 Q270 68 270 108" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="345" y="60" text-anchor="middle">Preempt</text>

<!-- Run -> Terminated -->
<line x1="520" y1="132" x2="578" y2="132" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="549" y="122" text-anchor="middle">Exit</text>

<!-- Run -> Wait -->
<line x1="470" y1="154" x2="470" y2="278" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="488" y="218" text-anchor="start">I/O request</text>

<!-- Wait -> Ready -->
<path d="M420 296 Q360 296 360 220 Q360 132 322 132" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="378" y="224" text-anchor="start">I/O done</text>

<!-- Ready -> Suspended Ready (swap out) -->
<path d="M230 154 Q200 300 220 438" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="190" y="300" text-anchor="end">Swap out</text>

<!-- Suspended Ready -> Ready (swap in) -->
<path d="M290 440 Q310 300 300 156" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="318" y="370" text-anchor="start">Swap in</text>

<!-- Wait -> Suspended Block (swap out) -->
<path d="M440 324 Q430 380 450 438" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="418" y="382" text-anchor="end">Swap out</text>

<!-- Suspended Block -> Wait (swap in) -->
<path d="M530 440 Q560 380 510 326" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="556" y="376" text-anchor="start">Swap in</text>

<!-- Suspended Block -> Suspended Ready -->
<line x1="410" y1="462" x2="322" y2="462" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="366" y="452" text-anchor="middle">I/O done</text>

<!-- Attribution -->
<text x="640" y="548" text-anchor="end" font-size="11px" fill="#b4b2a9">Generated by Claude</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="460" fill="#ffffff"/>

  <!-- Section header -->
  <text x="450" y="22" text-anchor="middle" font-size="10.5" fill="#888888" font-weight="600" letter-spacing="1.2">FORWARD PASS — numbers flowing layer to layer</text>

  <!-- Column titles -->
  <text x="220" y="44" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Without normalization</text>
  <text x="672" y="44" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">With normalization (BatchNorm)</text>

  <!-- Vertical divider -->
  <line x1="450" y1="52" x2="450" y2="400" stroke="#cccccc" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ══════════════════
       LEFT SIDE
  ══════════════════ -->

  <!-- Epoch 1 -->
  <text x="30" y="72" font-size="10.5" fill="#888888" font-style="italic">Epoch 1</text>
  <rect x="30" y="80" width="110" height="44" rx="7" fill="#f0efea" stroke="#9c9a92" stroke-width="0.8"/>
  <text x="85" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Layer 1</text>
  <text x="85" y="114" text-anchor="middle" font-size="10.5" fill="#5f5e5a">outputs 1–10</text>
  <line x1="140" y1="102" x2="162" y2="102" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="162" y="80" width="130" height="44" rx="7" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="227" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Layer 2</text>
  <text x="227" y="114" text-anchor="middle" font-size="10.5" fill="#0f6e56">learns for 1–10  ✓</text>

  <!-- Epoch 2 -->
  <text x="30" y="152" font-size="10.5" fill="#888888" font-style="italic">Epoch 2</text>
  <rect x="30" y="160" width="110" height="44" rx="7" fill="#f0efea" stroke="#9c9a92" stroke-width="0.8"/>
  <text x="85" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Layer 1</text>
  <text x="85" y="194" text-anchor="middle" font-size="10.5" fill="#5f5e5a">outputs 1k–100k</text>
  <line x1="140" y1="182" x2="162" y2="182" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="162" y="160" width="130" height="44" rx="7" fill="#fcebeb" stroke="#a32d2d" stroke-width="0.8"/>
  <text x="227" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#791f1f">Layer 2</text>
  <text x="227" y="194" text-anchor="middle" font-size="10.5" fill="#a32d2d">everything useless  ✗</text>
  <text x="30" y="220" font-size="10.5" fill="#a32d2d">weights shifted → Layer 2 re-learns from scratch</text>

  <!-- Epoch 3 -->
  <text x="30" y="244" font-size="10.5" fill="#888888" font-style="italic">Epoch 3</text>
  <rect x="30" y="252" width="110" height="44" rx="7" fill="#f0efea" stroke="#9c9a92" stroke-width="0.8"/>
  <text x="85" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Layer 1</text>
  <text x="85" y="286" text-anchor="middle" font-size="10.5" fill="#5f5e5a">outputs 0.01–0.3</text>
  <line x1="140" y1="274" x2="162" y2="274" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="162" y="252" width="130" height="44" rx="7" fill="#fcebeb" stroke="#a32d2d" stroke-width="0.8"/>
  <text x="227" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#791f1f">Layer 2</text>
  <text x="227" y="286" text-anchor="middle" font-size="10.5" fill="#a32d2d">re-learning again...  ✗</text>
  <text x="30" y="312" font-size="10.5" fill="#a32d2d">rug pulled again → wasted training steps</text>

  <!-- Left result -->
  <rect x="30" y="332" width="292" height="44" rx="8" fill="#fcebeb" stroke="#a32d2d" stroke-width="1"/>
  <text x="176" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#791f1f">Result: slow, unstable training</text>
  <text x="176" y="366" text-anchor="middle" font-size="10.5" fill="#a32d2d">Layer 2 never fully converges</text>

  <!-- ══════════════════
       RIGHT SIDE
  ══════════════════ -->

  <!-- Epoch 1 -->
  <text x="462" y="72" font-size="10.5" fill="#888888" font-style="italic">Epoch 1</text>
  <rect x="462" y="80" width="92" height="44" rx="7" fill="#f0efea" stroke="#9c9a92" stroke-width="0.8"/>
  <text x="508" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Layer 1</text>
  <text x="508" y="114" text-anchor="middle" font-size="10.5" fill="#5f5e5a">outputs 1–10</text>
  <line x1="554" y1="102" x2="572" y2="102" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="572" y="80" width="82" height="44" rx="7" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="613" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">BatchNorm</text>
  <text x="613" y="113" text-anchor="middle" font-size="10.5" fill="#534ab7">→ 0 to 1</text>
  <line x1="654" y1="102" x2="672" y2="102" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="672" y="80" width="96" height="44" rx="7" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="720" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Layer 2</text>
  <text x="720" y="114" text-anchor="middle" font-size="10.5" fill="#0f6e56">always sees 0–1</text>

  <!-- Epoch 2 -->
  <text x="462" y="152" font-size="10.5" fill="#888888" font-style="italic">Epoch 2</text>
  <rect x="462" y="160" width="92" height="44" rx="7" fill="#f0efea" stroke="#9c9a92" stroke-width="0.8"/>
  <text x="508" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Layer 1</text>
  <text x="508" y="194" text-anchor="middle" font-size="10.5" fill="#5f5e5a">outputs 1k–100k</text>
  <line x1="554" y1="182" x2="572" y2="182" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="572" y="160" width="82" height="44" rx="7" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="613" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">BatchNorm</text>
  <text x="613" y="193" text-anchor="middle" font-size="10.5" fill="#534ab7">→ 0 to 1</text>
  <line x1="654" y1="182" x2="672" y2="182" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="672" y="160" width="96" height="44" rx="7" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="720" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Layer 2</text>
  <text x="720" y="194" text-anchor="middle" font-size="10.5" fill="#0f6e56">always sees 0–1</text>
  <text x="462" y="220" font-size="10.5" fill="#0f6e56">Layer 1 went wild — Layer 2 still sees 0–1  ✓</text>

  <!-- Epoch 3 -->
  <text x="462" y="244" font-size="10.5" fill="#888888" font-style="italic">Epoch 3</text>
  <rect x="462" y="252" width="92" height="44" rx="7" fill="#f0efea" stroke="#9c9a92" stroke-width="0.8"/>
  <text x="508" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Layer 1</text>
  <text x="508" y="286" text-anchor="middle" font-size="10.5" fill="#5f5e5a">outputs 0.01–0.3</text>
  <line x1="554" y1="274" x2="572" y2="274" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="572" y="252" width="82" height="44" rx="7" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="613" y="269" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">BatchNorm</text>
  <text x="613" y="285" text-anchor="middle" font-size="10.5" fill="#534ab7">→ 0 to 1</text>
  <line x1="654" y1="274" x2="672" y2="274" stroke="#888888" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="672" y="252" width="96" height="44" rx="7" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="720" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Layer 2</text>
  <text x="720" y="286" text-anchor="middle" font-size="10.5" fill="#0f6e56">always sees 0–1</text>
  <text x="462" y="312" font-size="10.5" fill="#0f6e56">stable range every epoch — keeps learning  ✓</text>

  <!-- Right result -->
  <rect x="462" y="332" width="406" height="44" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="665" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Result: fast, stable training</text>
  <text x="665" y="366" text-anchor="middle" font-size="10.5" fill="#0f6e56">Layer 2 builds on previous learning every epoch</text>

  <!-- ── Footer ── -->
  <text x="868" y="448" text-anchor="end" font-size="9.5" fill="#b4b2a9">Generated by Claude</text>

</svg>
